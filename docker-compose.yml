services:
  orthanc:
    image: orthancteam/orthanc:25.5.0
    ports: ["8042:8042"]
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc-db:/var/lib/orthanc/db
    restart: unless-stopped

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - ORTHANC_URL=http://orthanc:8042
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - model-cache:/root/.torchxrayvision
      - backend-storage:/app/storage
    depends_on: [orthanc]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on: [backend]

volumes:
  orthanc-db:
  model-cache:
  backend-storage:
